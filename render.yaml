services:
  - type: web
    name: magicpin-candidate-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LLM_API_KEY
        sync: false
        description: "Your LLM API Key (e.g. Groq, Gemini)"
